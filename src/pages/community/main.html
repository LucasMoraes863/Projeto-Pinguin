<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comunidade — Pinguins</title>
  <link rel="icon" href="../../images/penguin-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../styles/community.css"/>
  <link rel="stylesheet" href="../../styles/main.css"/>
  <script src="../../scripts/session.js"></script>
</head>
<body >

  <!-- SIDEBAR -->
  <div class="sidebar">

    <a href="../../index.html" class="sidebar-logo">PENGU<em class="emphasis-text">I</em>NS</a>

    <!-- User -->
    <div class="sidebar-user">
      <div class="sidebar-avatar">
        <img class="sidebar-avatar" src="../../images/icons/user.png" alt="">
      </div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-name" id="user_name_sidebar"></span>
      </div>
    </div>

    <!-- Left bar -->
    <p class="sidebar-label">Menu</p>
    <nav class="sidebar-nav">
      <a class="sidebar-nav-item active">Feed</a>
      <a class="sidebar-nav-item">Meu perfil</a>
      <a class="sidebar-nav-item">Dashboard</a>
      <a class="sidebar-nav-item">Quiz</a>
      <a class="sidebar-nav-item">Pinguin Favorito</a>
    </nav>

    <button class="sidebar-logout" onclick="limparSessao()">Sair</button>

  </div>
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <h1 class="topbar-title">Comunidade <em class="emphasis-text">Pinguins</em></h1>
    </div>

    <!-- feed -->
    <div class="feed">

      <!-- New Post -->
      <div class="new-post" id="post-publish">
        <input class="new-post-input" type="text" id="ipt_title_post"  placeholder="Título do post…" />
        <input class="new-post-body" type="text" id="ipt_content_post" placeholder="Compartilhe algo sobre pinguins…"></input>
        <div class="new-post-footer">
          <button class="btn-solid" onclick="publicar()">Publicar</button>
        </div>
      </div>
      
      <!--Container for all the posts -->
      <div id="feed_container">
        <div id="no_content" class="no-content">
          <div class="no-content-img">
            <img src="../../images/icons/no_data_black.png" class="no-content-img">
          </div>
          <span class="no-content-text" id="no_content_text">Test</span>
         </div>
      </div>
    </div>
  </div>
</body>
<script src="../../scripts/feed.js"></script>
</html>
